name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Inject Cloudflare resource IDs
        env:
          D1_DATABASE_ID: ${{ vars.D1_DATABASE_ID }}
          KV_NAMESPACE_ID: ${{ vars.KV_NAMESPACE_ID }}
        run: |
          sed -i "s/PLACEHOLDER_D1_DATABASE_ID/${D1_DATABASE_ID}/" wrangler.jsonc
          sed -i "s/PLACEHOLDER_KV_NAMESPACE_ID/${KV_NAMESPACE_ID}/" wrangler.jsonc

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply llm-router --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
